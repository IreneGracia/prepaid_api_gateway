<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}{{ app_name }}{% endblock %}</title>
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body>
  <nav class="portal-nav">
    <a href="/" class="nav-brand">Prepaid API Gateway</a>
    <div class="nav-links">
      <a href="/portal/developer" class="{% if active_portal == 'developer' %}active{% endif %}">Developer Dashboard</a>
      <a href="/portal/admin" class="{% if active_portal == 'admin' %}active{% endif %}">Admin</a>
    </div>
  </nav>

  <div class="container">
    {% block content %}{% endblock %}
  </div>

  <script src="/static/common.js"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
